    PaymentTokenStatus.v1:
      title: Payment token status
      type: string
      enum:
        - CREATED
        - WAITING
        - SUCCESS
        - FAILED
        - DELETED
      example: SUCCESS
      description: |-
        Token issue statuses:
          * `CREATED` - request for token issue created
          * `WAITING` - request is waiting for user's actions
          * `SUCCESS` - token successfully created
          * `FAILED` - token creation failed
          * `DELETED` - token deleted
    PaymentTokenStatusOnCreate.v1:
      title: Payment token status on invoice create
      type: string
      enum:
        - CREATED
        - WAITING
        - SUCCESS
        - FAILED
      example: SUCCESS
      description: |-
        Token issue status on invoice create:
          * `CREATED` - request for token issue created
          * `WAITING` - request is waiting for user's actions
          * `SUCCESS` - token successfully created
          * `FAILED` - token creation failed
