    PaymentTokenDeleteResponseSuccess.v1:
      title: Successful response
      type: object
      allOf:
        - $ref: '#/components/schemas/ResponseOK.v1'
        - properties:
            data:
              title: Information on payment token deletion
              type: object
              nullable: true
              example:
                payment_token:
                  token: a8ab95e1-4566-4fe9-93ea-bd83698ff5a0
                  deleted_at: '2026-05-19T20:07:02'
                  status: DELETED
                  error_code: 0
              properties:
                payment_token:
                  type: object
                  description: Payment token data
                  properties:
                    token:
                      type: string
                      format: uuid
                      description: Payment token
                      example: 4f6cf35x-2c4y-483z-a0a9-158621f77a21
                    deleted_at:
                      title: <ISO 8601>
                      type: string
                      format: date-time
