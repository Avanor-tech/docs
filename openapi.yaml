                  description: Information on the bank card
                  properties:
                    issuing_country:
                      type: string
                      maxLength: 3
                      minLength: 3
                      description: Issuer's country code. Alphabetical country identifier under [ISO 3166-1 alpha-3](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3).
                      example: GBR
                    issuing_bank:
                      type: string
                      example: Example Bank
                      description: Issuing bank
                    payment_system:
                      type: string
                      example: VISA
                      description: Payment system type
                    funding_source:
                      type: string
                      example: DEBIT
                      description: Card type
                    payment_system_product:
