paths:
  /invoice/try:
    post:
      summary: Invoice preliminary calculation
      operationId: post-invoice-try
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Successful response
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceTryInfo.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoicePayload.v1'
      security:
        - RequestSignature: []
      tags:
        - invoice-create
      description: |
        Retrieves additional information for invoice creation.

        <div class="attention">
        This method <strong> is not mandatory </strong> for all payment ways.
        For more information, please contact the technical support service.
        </div>

        It can be used in the following cases:

        * You want to find out the total amount subject to all fees paid by the user,
          before invoice.
        * Payment way requires dynamic set of fields depending on the payment parameters.
          In this case, you need to use the `add_ons_config`, `info`, `manual` and `warning` to
          generate customer form.

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `amount`
        * `currency`
        * `payway`
        * `shop_id`
        * `shop_order_id`
        </div>
  /invoice/create:
    post:
      summary: Invoice issue
      operationId: post-invoice-create
      responses:
        '200':
          description: ''
          x-summary: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Invoice has been successfully issued
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceCreateInfo.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreatePayload.v1'
        description: ''
      tags:
        - invoice-create
      description: |
        Additional parameters can be transferred in the request, for example:

        * `description` – invoice description,
        * `phone` – phone number linked to the wallet;
        * `account` – card number;

        The list of these parameters depends on the payway (`payway`). The required additional parameters for the payway can be found in the request "Getting payment methods for input" [shop_input_config/shop](#operation/post-shop-input-config-shop) in the `add_ons_config` response field.

        ### Redirecting to invoice payment forms

        If the request is successful, API will return the parameters necessary to redirect the user to the payment system for payment. These parameters will be in the `data` field of the response. The `data.data` field contains the parameters to be transferred during redirection (in the form of `GET` or `POST` request parameters).

        The redirection method depends on the `method` parameter. The generated request must be sent to the URL specified in the `url` field of the `data` field.

        For example, if you receive a `POST` in the `method` parameter to redirect a client to pay an invoice, you need to generate an HTML form from the parameters received in the response body (these parameters will differ for different payment systems).

        An example of forming an HTML form using the `jinja2` template language:

        ```jinja2
        <form method="POST" action="{{ data['url'] }}">
            {% for param, value in data['data'].items() %}
              <input name="{{ param }}" value="{{ value }}" />
            {% endfor %}
        </form>
        ```

        For the data specified in the example response below, the following HTML form will be obtained:

        ```html
        <form method="POST" action="https://checkout.domain.com/form/">
          <input name="transaction_id" value="1231" />
          <input name="payment_type" value="card" />
          <input name="fail_url" value="https://example.com/payment/?status=fail" />
          <input name="success_url" value="https://example.com/payment/?status=success" />
          <input type="submit" />
        </form>
        ```

        In case of `"method": "GET"` it is required to perform HTTP redirect to the URL with the parameters (using [percent‐encoding](https://en.wikipedia.org/wiki/Percent-encoding)), received in the `data.data` response field.

        The URL is generated according to the following algorithm:

        ```python
        import urllib.parse
        redirect_url = '{url}?{parameters}'.format(url=data['url'], parameters=urllib.parse.urlencode(data['data']))
        ```

        An example of the formed URL: `https://checkout.domain.com/form/?transaction_id=1231&payment_type=card&fail_url=https%3A%2F%2Fexample.com%2Fpayment%2F%3Fstatus%3Dfail&success_url=https%3A%2F%2Fexample.com%2Fpayment%2F%3Fstatus%3Dsuccess`

        <div class="attention">
        Please note that the parameters <code>failed_url</code>, <code>success_url</code>, <code>callback_url</code>, <code>callback_rejected_url</code> specified in the shop settings have priority over those specified in request. If you want to use unique url for each request, you need to inform the manager about it.
        </div>

        ### Payer Browser Authentication for 3D Secure

        For 3ds 2.0 payments with card data to be successful, the payer's browser information must be collected.

        You can collect the data yourself or let our service perform this for you. If you collect the data on your end, please ensure that all the necessary values are included to the payment initiation request [/invoice/create](#operation/post-invoice-create).

        As an example, the provided JavaScript code could be employed to obtain the Payer Browser information. Please be aware that the `client_info` fields provided below do not include `browser_accept_header`.

        ```js
        let client_info = {
            "browser_java_enabled": window.navigator.javaEnabled(),
            "browser_javascript_enabled": true,
            "browser_language": window.navigator.language,
            "browser_color_depth": window.screen.colorDepth.toString(),
            "browser_screen_height": window.screen.height.toString(),
            "browser_screen_width": window.screen.width.toString(),
            "browser_tz": (new Date()).getTimezoneOffset().toString(),
            "browser_user_agent": window.navigator.userAgent,
            "challenge_window_size": "05"
        }
        ```

        If the payer's browser data is not provided in the [/invoice/create](#operation/post-invoice-create) request, it will be necessary to redirect the payer to our service as an intermediate step using a `data` object, so that our service can collect the necessary browser data. See [Redirecting to invoice payment forms](#redirecting-to-invoice-payment-forms) for the details on redirect.

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `amount`
        * `currency`
        * `payway`
        * `shop_id`
        * `shop_order_id`
        </div>
  /invoice/check:
    post:
      summary: Issued invoice status request
      operationId: post-invoice-check
      description: |
        To get the status and up-to-date information regarding issued invoice.

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `now`
        * `shop_id`
        * `shop_order_id`
        </div>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Successful response
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceCheckData.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      security:
        - RequestSignature: []
      tags:
        - invoice-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCheckPayload.v1'
  /invoice/hold:
    post:
      summary: Funds hold (two-stage payments)
      operationId: post-invoice-hold
      responses:
        '200':
          description: ''
          x-summary: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Successful response
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceCreateInfo.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceHoldPayload.v1'
        description: ''
      tags:
        - invoice-create
      description: |
        <div class="attention">This feature is available only after approval by the manager.</div>

        *First step of two-step payment.*

        First step is performed according to the scheme [invoice/create](#operation/post-invoice-create).

        After successful creation and payment of the invoice, [status](#tag/invoice-statuses) will be equal to **8 (Invoice funds are on hold in the payment system)**.

        To complete the funds receipt operation, execute [invoice/charge](#operation/post-invoice-charge) or to cancel,
        execute [invoice/unhold](#operation/post-invoice-unhold).

        <div class="warning">
        When funds are held, merchants are required to confirm or cancel the payment within 5 days.
        M5 service does not automatically confirm or cancel held payments after this period.

        The funds holding period cannot exceed 5 days.
        </div>

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `amount`
        * `currency`
        * `payway`
        * `shop_id`
        * `shop_order_id`
        </div>
  /invoice/charge:
    post:
      summary: Confirmation of funds withdrawal (charge)
      operationId: post-invoice-charge
      responses:
        '200':
          description: ''
          x-summary: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Funds have been successfully withdrawn
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceChargeInfo.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceChargePayload.v1'
        description: ''
      tags:
        - invoice-create
      description: |
        ### Withdrawal confirmation.

        Performed **only** after [invoice/hold](#operation/post-invoice-hold) method (second step of two-stage payment)

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `invoice_id`
        * `now`
        * `shop_id`
        </div>
  /invoice/unhold:
    post:
      summary: Cancellation of funds holding
      operationId: post-invoice-unhold
      responses:
        '200':
          description: ''
          x-summary: OK
          content:
            application/json:
              schema:
                oneOf:
                  - title: Funds have been unhold successfully
                    allOf:
                      - $ref: '#/components/schemas/ResponseOK.v1'
                      - properties:
                          data:
                            $ref: '#/components/schemas/InvoiceUnholdInfo.v1'
                  - $ref: '#/components/schemas/ResponseFail.v1'
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceUnholdPayload.v1'
        description: ''
      tags:
        - invoice-create
      description: |
        ### Cancellation of funds hold.

        Executed **only** after the method [invoice/hold](#operation/post-invoice-hold)

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `invoice_id`
        * `now`
        * `shop_id`
        </div>
  /shop_input_config/shop:
    post:
      summary: Getting payment methods for input
      operationId: post-shop-input-config-shop
      description: |
        Provides an up-to-date list of available payment ways and their additional parameters required for invoicing.

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `now`
        * `shop_id`
        </div>
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopConfigPayload.v1'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopInputConfigResponse.v1'
      tags:
        - invoice-create
  /invoice/create-refund:
    post:
      summary: Invoice refund
      operationId: post-invoice-create-refund
      description: |-
        Method for creating a refund to the payer from the partner's balance,
        with a successfully paid invoice ([invoice status](#tag/invoice-statuses) has a value of 4).

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `amount`
        * `invoice_id`
        * `shop_id`
        * `shop_refund_id`
        </div>
      security:
        - RequestSignature: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceRefundPayload.v1'
      responses:
        '200':
          description: ''
