    x-displayName: Other shop methods
    description: |
      ### Other methods available for the shop
  - name: errors-list
    x-displayName: List of possible errors
    description: |
      ### List of possible M4 API errors

      You can use this data to control the logic of your application, analyze and solve problems, output messages
      to the user, and for any other purpose. For example, if you received `error_code: 11` in the response, then most likely you
      incorrectly specified the value of the `shop_id` parameter in the request body.

      If you receive `result: false` in the response, this means that an error occurred, and the transaction was either not created (
      for example, in case of request body validation error), or ended with an error (for example, the payment system returned an error when
      trying to perform a transaction). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks) (applies to [invoice](#tag/invoice-create) or [refund](#tag/invoice-refund) transactions) or after a certain time start requesting the status of the transaction (applies to [payout](#tag/withdraw-create) transactions) (for 2 hours at 30-second intervals). If the `error code` is fatal the communication with our API is over.

      If you receive `result: true` in response, it means that the transaction was created successfully. If the transaction status in the synchronous
      response is not final (or is absent for some types of transactions), then you need
      to wait for the [server notification](#tag/callbacks) or after a certain time start requesting the status
      of the transaction (applies only to [payout](#tag/withdraw-create) transactions). After receiving the final status of the transaction,
      the communication with our API is over.

      | Error code | Description                                                                                                                                                                         |  Fatal  |
      |------------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|:-------:|
      | 1          | Payway has not been found                                                                                                                                                           | &plus;  |
      | 2          | Payway is not active                                                                                                                                                                | &plus;  |
      | 3          | Payway is not available                                                                                                                                                             | &plus;  |
      | 4          | The specified amount is too small (payway restriction)                                                                                                                              | &plus;  |
      | 5          | The specified amount is too big (payway restriction)                                                                                                                                | &plus;  |
      | 6          | A non-unique operation identifier has been transferred on the part of the shop                                                                                                      | &plus;  |
      | 7          | Operation has not been found                                                                                                                                                        | &plus;  |
      | 8          | Operation is being processed                                                                                                                                                        | &plus;  |
      | 9          | Insufficient balance                                                                                                                                                                | &plus;  |
      | 10         | Invalid request parameters                                                                                                                                                          | &plus;  |
      | 11         | Shop has not been found                                                                                                                                                             | &plus;  |
      | 12         | Shop is not active                                                                                                                                                                  | &plus;  |
      | 13         | Account has not been found in M4 system                                                                                                                                     | &plus;  |
      | 14         | Account status does not allow operations                                                                                                                                            | &plus;  |
      | 15         | Request from the current IP has been rejected                                                                                                                                       | &plus;  |
      | 16         | Currency exchange rate has not been found                                                                                                                                           | &plus;  |
      | 17         | Invalid contract type for the shop                                                                                                                                                  | &plus;  |
      | 18         | Invalid account type                                                                                                                                                                | &plus;  |
      | 19         | Unable to perform operation for shop with the status of an aggregator                                                                                                               | &plus;  |
      | 20         | Invalid project ID                                                                                                                                                                  | &plus;  |
      | 21         | Project is inactive                                                                                                                                                                 | &plus;  |
      | 22         | Invalid shop currency                                                                                                                                                               | &plus;  |
      | 23         | Account deposit limit exceeds                                                                                                                                                       | &plus;  |
      | 24         | Invalid payee balance                                                                                                                                                               | &plus;  |
      | 25         | Zero amount is specified                                                                                                                                                            | &plus;  |
