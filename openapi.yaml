tags:
  - name: invoice-create
    x-displayName: Invoice issue (payment creation)
    description: |
      ### Invoicing procedure

      `Single-step payment` is a type of payment in which a single request [invoice/create](#operation/post-invoice-create) is immediately blocking and withdrawing funds.

      `Two-step payment` is a type of payment when funds are withdrawn in two steps.
      *You can check which payment ways support two-stage payment with the manager.*
      The first request [invoice/hold](#operation/post-invoice-hold) is used to hold (block) funds on the client's account.
      The second request [invoice/charge](#operation/post-invoice-charge) initiates the withdrawal.
      If you want to cancel a previously held payment, then cancel it using the [invoice/unhold](#operation/post-invoice-unhold) method. The money will be returned to the payer.

      ### Single-step payment
      ![Invoice Flow Diagram](assets/common/images/en/invoice-flow.v1.png)

      1. User generates an order on the shop's website;

      2. Shop sends a request to pre-calculate the invoice and get additional parameters [invoice/try](#operation/post-invoice-try);

      3. When receiving `result: true`, verify the availability of additional information in `add_ons_config`, if present, it is necessary to pass additional parameters in the invoice request. When you get `result: false`, you need to analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks). If the `error code` is fatal, then communication with our API is over.

      4. After verifying [invoice/try](#operation/post-invoice-try), the shop sends an invoice request [invoice/create](#operation/post-invoice-create), specifying the required parameters and additional information from `add_ons_config` (if it is required for the specified payment direction);

      5. The response returns information with the invoice and data to be sent by the specified method to the specified URL for making or charging the payment. It is necessary to send the user to make a payment. In case `result: false`, you need to analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks). If the `error code` is fatal, then communication with our API is over, it is necessary to inform the user that the payment was not created.

      6. After the payment is made or charged by the user, the M4 system [sends a notification](#tag/callbacks) to the URL of interaction with the shop, containing payment information, for more information, see [here](#operation/post-invoice-create);

      7. After receiving the charge, the payment is considered successfully completed.

      ### Two-step payment

      *Most often, a two-stage payment is used for payments by bank cards.*

      ![Invoice Two Stage Flow Diagram](assets/common/images/en/invoice-two-stage-flow.v1.png)

      1. User generates an order on the shop's website;

      2. Shop sends a request for a preliminary calculation of the issued invoice and receiving additional parameters [invoice/try](#operation/post-invoice-try);

      3. When receiving `result: true`, the availability of additional information in `add_ons_config` is checked, if present, additional parameters should be passed in the invoice request. When you get `result: false`, you need to analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks). If the `error code` is fatal, then communication with our API is over.

      4. After verification [invoice/try](#operation/post-invoice-try) shop sends invoice request [invoice/hold](#operation/post-invoice-hold), specifying the required parameters and additional information from `add_ons_config` (if it is required for the specified payment way);

      5. The response returns information with the invoice issued and data to be sent by the specified method to the specified URL for making or charging the payment. It is necessary to refer the user to make the payment. In case `result: false`, you need to analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks). If the `error code` is fatal, then communication with our API is over, it is necessary to inform the user that the payment was not created.

      6. After payment is completed by the user, the M4 system [sends a notification](#tag/callbacks) to the shop's interaction URL, with information about the blocking of funds;

      7. After the funds are blocked on the client's account, you can charge the payment [invoice/charge](#operation/post-invoice-charge) or cancel the holding [invoice/unhold](#operation/post-invoice-unhold);

      8. The response returns information with the result of charge (sometimes the payment status may not be final, then you should wait for the notification);

      9. M4 system [will send a notification](#tag/callbacks) to the URL of the interaction of the shop with the final status regarding the confirmation of funds withdrawal.

      ### Ensuring payments idempotency

      <div class="warning">
      The system has duplication protection for invoice creation, <code>shop_order_id</code> should be unique within a single shop.
      </div>
  - name: invoice-refund
    x-displayName: Refunds
    description: |
      The refund of the paid invoice can be full or partial.

      * In case of a full refund, you refund the successfully paid payment in full.
      * In case of a partial refund - a part of the payment amount, for example, if you want to refund a part of the purchase.

      After confirmation of the refund by the payment system, the M4 system [will send a notification](#tag/callbacks) with details
      of refund to the URL transferred in the request when creating the refund. A detailed description of the notification format
      is described [here](#section/Refund-notification-example).

      Please note that if you receive `result: false` in response in case of a synchronous response to a request, this means that
      you need to analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to wait for the [server notification](#tag/callbacks). If the `error code` is fatal, then the refund transaction will not be created (it will either not be created at all if basic checks
      have not passed, or it will be created with the immediate status `FAILED`). In this case, communication with our API is over.

      If in case of a synchronous response to a request in the response you received `result: true`, this means that you need to check the status
      of the refund transaction in the response body:
      it can be final (`SUCCESS`, `FAILED`), and then communication with the API is over, or it can be `WAITING` — then
      you have to wait for some time for a [server notification](#tag/callbacks) from us with the final status.

      <div class="success">
      Refunds are made in the currency of the paid invoice, under which the refund transaction is carried out.
      </div>

      <div class="warning">
      Check with the manager for available refund ways for specific payment methods.
      </div>
  - name: callbacks
    x-displayName: Interaction format
    description: |
      ### Issued invoice notice after payment or refund

      After changing the payment status or returning to one of the final ones, the M4 system sends a notification to the shop to the URL specified in the shop settings or in the request body (if specified in the description of the request parameters).

      <div class="warning">
      <p>To successfully receive server-side notifications, please make sure that your server receiving HTTP requests from us is configured according to the current security standards described on <a href="https://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Protection_Cheat_Sheet.html">https://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Protection_Cheat_Sheet.html</a></p>
      <p>Pay special attention to the TLS ciphers you support.</p>
      </div>

      Notifications for payments and refunds are delivered to one callback URL. You can distinguish notifications by the value of the GET parameter named `type` in the URL from which you received the notification.
      Possible values of `type`:
      * `invoice` - payment notification
      * `refund` - refund notification

      Server notifications are sent from the following IP addresses:

      |IP addresses|
      |-|
      |35.198.100.222|
      |35.198.175.25|

      HTTP protocol is used to send the notification:

      * Method: `POST`
      * Format: `Content-Type: application/json`

      <div class="success">
      <p>If necessary, the support service can enable an alternative notification format: <code>Content-Type: application/x-www-form-urlencoded</code>, in this case, all the transmitted parameters will have a string representation.</p>
      </div>

      <div class="attention">
      <p>It is <strong>necessary</strong> to check the values from the notification with the values in the invoice, and <strong>to check</strong> signature in the notification.</p>
      <p>The signature is generated using the same algorithm as when issuing the invoice.</p>
      <p>All the not-null and non-empty parameters present in the notification are involved in the signature validation, including zero values. At the same time, <code>null</code> values and empty strings are not involved in signature validation and are excluded.</p>
      </div>

      <p>Consider building your system using forward compatibility strategy to be ready to handle new parameters in the server notifications without need to upgrade your own system.</p>

      ### Expected response

      If the notice is received and processed correctly, it is necessary to return the status `200` and the message body `OK` (`text/plain`) to the `HTTP` response. Otherwise, notices will be sent again, with an increasing interval, including only 25 attempts, the last one at the end of the day.

      ## Payment notification example

      <SchemaDefinition schemaRef="#/components/schemas/InvoiceCallBack" />

      ## Refund notification example

      <SchemaDefinition schemaRef="#/components/schemas/RefundCallBack" />

      ## Example of Python code to verify the signature of a request

      The algorithm implemented below on the example of a server payment notification is the same for a server refund notification.

      ```python
      # Resulting notification string (in format application/json)
      request_body_json = """
          {
            "shop_id": 1,
            "shop_order_id": "The store's order ID",
            "description": "Your payment description",
            "shop_amount": 100.0,
            "shop_refund": 19.0,
            "shop_currency": 840,
            "payment_id": 1234,
            "client_price": 100.0,
            "ps_currency": "840",
            "payway": "payway_example",
            "ps_data": "{\\"amount\\": \\"20.00\\", \\"bill_id\\": \\"i_100\\", \\"ccy\\": \\"USD\\", \\"command\\": \\"bill\\", \\"comment\\": \\"[i_100] Payment\\", \\"error\\": 0, \\"prv_name\\": \\"PaymentSystem\\", \\"ps_payer_account\\": \\"150010000097\\", \\"status\\": \\"paid\\", \\"user\\": \\"tel:+150010000097\\"}",
            "created": "2026-08-27T15:38:07",
            "updated": "2026-08-27T15:38:07",
            "status": "success",
            "addons": "{\\"callback_rejected_url\\": \\"https://some-shop.com/callback-rejected-url\\", \\"callback_url\\": \\"https://some-shop.com/callback-url\\", \\"description\\": \\"Some payment\\", \\"failed_url\\": \\"https://some-shop.com/fail\\", \\"phone\\": \\"150010000097\\", \\"success_url\\": \\"https://some-shop.com/success\\"}",
            "sign": "26bcafa4b08dcfa901e47caa977c75ed286bb4390fb8271eb96e2f46470ffbf7"
      }"""

      import json
      parsed_request = json.loads(request_body_json)

      # Resulting notification string (in format application/x-www-form-urlencoded)
      if content_type == 'application/x-www-form-urlencoded':
          request_body_form_urlencoded = (
              'shop_id=1&shop_order_id=The+store's+order+ID&description=Your+payment+description&s'
              'hop_amount=20.0&shop_refund=19.0&shop_currency=840&payment_id=100&'
              'client_price=20.0&ps_currency=840&payway=payway_example&ps_data='
              '%7B%22amount%22%3A+%2220.00%22%2C+%22bill_id%22%3A+%22i_100%22%2C+'
              '%22ccy%22%3A+%22USD%22%2C+%22command%22%3A+%22bill%22%2C+%22commen'
              't%22%3A+%22%5Bi_100%5D+Payment%22%2C+%22error%22%3A+0%2C+%22prv_na'
              'me%22%3A+%22PaymentSystem%22%2C+%22ps_payer_account%22%3A+%2297151'
              '0000000%22%2C+%22status%22%3A+%22paid%22%2C+%22user%22%3A+%22tel%3'
              'A%2B150010000097%22%7D&created=2026-08-27T15%3A38%3A07&updated=202'
              '0-08-21T15%3A38%3A07&status=success&addons=%7B%22callback_rejected'
              '_url%22%3A+%22https%3A%2F%2Fsome-shop.com%2Fcallback-rejected-url%'
              '22%2C+%22callback_url%22%3A+%22https%3A%2F%2Fsome-shop.com%2Fcallb'
              'ack-url%22%2C+%22description%22%3A+%22Some+payment%22%2C+%22failed'
              '_url%22%3A+%22https%3A%2F%2Fsome-shop.com%2Ffail%22%2C+%22phone%22'
              '%3A+%22150010000097%22%2C+%22success_url%22%3A+%22https%3A%2F%2Fso'
              'me-shop.com%2Fsuccess%22%7D&sign=26bcafa4b08dcfa901e47caa977c75ed2'
              '86bb4390fb8271eb96e2f46470ffbf7'
          )
          from urllib.parse import parse_qsl
          parsed_request = dict(parse_qsl(request_body_form_urlencoded))

      print(parsed_request)
      # {
      #     'shop_id': 100,
      #     'shop_order_id': 'The store's order ID',
      #     'description': 'Some payment',
      #     'shop_amount': 20.0,
      #     'shop_refund': 19.0,
      #     'shop_currency': 840,
      #     'payment_id': '100',
      #     'client_price': 20.0,
      #     'ps_currency': 840,
      #     'payway': 'payway_example',
      #     'ps_data': '{"amount": "20.00", "bill_id": "i_100", "ccy": "USD", "command": "bill", "comment": "[i_100] Payment", "error": 0, "prv_name": "PaymentSystem", "ps_payer_account": "150010000097", "status": "paid", "user": "tel:+150010000097"}',
      #     'created': '2026-08-27T15:38:07',
      #     'updated': '2026-08-27T15:38:07',
      #     'status': 'success',
      #     'addons': '{"callback_rejected_url": "https://example.com/callback-rejected-url", "callback_url": "https://example.com/callback-url", "description": "Your payment description", "failed_url": "https://example.com/fail", "phone": "150010000097", "success_url": "https://example.com/success"}',
      #     'sign': '5d3ea83ec487fb1a769942b348741eafa5b124073d9bca968977731b724ee397',
      # }

      # Let's get a list of sorted keys for signature generation
      keys = sorted(parsed_request)

      # Let's remove the signed key from them.
      keys.remove('sign')

      print(keys)
      # This is how the resulting list will look like
      #     ['addons',
      #      'client_price',
      #      'created',
      #      'description',
      #      'payment_id',
      #      'payway',
      #      'ps_currency',
      #      'ps_data',
      #      'shop_amount',
      #      'shop_currency',
      #      'shop_id',
      #      'shop_order_id',
      #      'shop_refund',
      #      'status',
      #      'updated']

      # Let's compose a line using the sorted key values obtained in the previous step
      values_to_sign = []
      for k in keys:
          if parsed_request[k] != '' and parsed_request[k] is not None:
              values_to_sign.append(str(parsed_request[k]))

      # Let's form the final signature and check its value with the value received in the response
      string_to_sign = ':'.join(values_to_sign) + '<secret_key_here>'
      import hashlib
      sign = hashlib.sha256(string_to_sign.encode()).hexdigest()
      assert sign == parsed_request['sign']
      ```
  - name: invoice-recurrent
    x-displayName: Recurrent invoice
    description: |
      <div class="attention">This feature is available only after approval by the manager.</div>

      You can withdraw funds regularly from the payment instrument of the buyer without repeated entry of details and without participation of the payer to initiate the next payment. With such way of funds withdrawal the user should only confirm the first payment or linking of the payment instrument, all subsequent payments will be made without his/her participation.

      To create the first payment in the chain and to generate the payment token, pass `issue_payment_token: true` in [invoice/create](#operation/post-invoice-create) or [invoice/hold](#operation/post-invoice-hold).

      You will then receive a [notification](#tag/callbacks) with `payment_token` inside `ps_data`. Save that token for subsequent charges.

      <div class="warning">Parameter <strong>payment_token</strong> is sent only after a successful transaction.</div>

      For each following payment, submit `payment_token: "<payment token>"` in [invoice/create](#operation/post-invoice-create). The response may return `method: null` and `url: null` when no redirect to the payment page is required; the final result arrives via [notification](#tag/callbacks).
  - name: invoice-statuses
    x-displayName: Invoice statuses
    description: |
      List of possible statuses of the created invoice.

      | Numerical identifier | Description                                          | Final     |
      |:-----:|---------------------------------------------------------------------|:---------:|
      |  1    | Payment request has been created                                    | &minus;   |
      |  2    | Payment is awaiting user action                                     | &minus;   |
      |  3    | Payment system has failed to create the payment                     | &minus;   |
      |  4    | Payment has been successful                                         | &plus;    |
      |  5    | Payment system has failed to receive a payment notice               | &minus;   |
      |  6    | M4 payment system has rejected the operation               | &plus;    |
      |  8    | Funds for the invoice are withheld (held) by the payment system     | &minus;   |
  - name: withdraw-create
    x-displayName: Payout creation
    description: |
      ### Process of shop payouts generation is as follows:

      ![Withdraw Flow Diagram](assets/common/images/en/withdraw-flow.v1.png)

      1. Shop executes a request for a preliminary calculation and receiving additional parameters for further creation of the payout using the method [withdraw/try](#operation/post-withdraw-try);

      2. If `result: true`, the shop sends request for a preliminary check of the existence and possibility of adding funds to the account [check_account](#operation/post-withdraw-check-account), to the specified payment way (if necessary, specify additional parameters obtained from the previous request from the `account_info_config` field);

      3. If `result: true`, verify availability of additional information in the `account_info` field, if available, it is necessary to pass additional parameters in the payout creation request. When getting `result: false`, analyse the error code in the `error_code` field (see [description of error codes](#tag/errors-list)). If the `error code` is not fatal, then you need to start requesting the status of the transaction after a certain time (for 2 hours at 30-second intervals). If the `error code` is fatal the communication with our API is over.

      4. Shop submits a request for payout creation [withdraw/create](#operation/post-withdraw-create), specifying the required parameters and additional information from `account_info` (if it is required for the specified payment way);

      5. The response returns information with the generated payout request and indicating the amounts and the payout ID. In this case, the part of the balance of the shop from which the payout is made is frozen until the final payout status.

      6. After payout creation, it is necessary to make a request to get the status of the created payout [withdraw/status](/#operation/post-withdraw-status) or [withdraw/shop_payment_status](/#operation/post-withdraw-shop-payment-status), before receiving the final status.

      <div class="attention">
      Status requests are recommended to be made at 30-second intervals.
      </div>

      7. After final status is received, the payout is considered completed, and the funds are debited from the shop's balance (or returned to the balance if the payout was not completed).

      ### Guidelines for creation and verification of payout requests

      If you received `result: true` after creating the payout, you should immediately check the `data.status` field, perhaps there will already be a final [status](#tag/withdraw-statuses), for example `6 (Rejected)` and in this case, you do not need to make a request for the payout status.

      If you receive the `Read timeout` error at the payout creation request, then you need to make a status request by the shop's payout number [withdraw/shop_payment_status](#operation/post-withdraw-shop-payment-status) and if the response returns an error stating the absence of such a payout, you can repeat the request to create a payout. If the payout status is returned in the response, then it means that it was created and you need to focus on this status.

      Reason for payout rejection ([getting status 6](#tag/withdraw-statuses)) can be clarified through the support service <a href="mailto:support@m4solutions.io">support@m4solutions.io</a>.

      ### Securing payouts idempotency

      <div class="warning">
      System has duplication protection for payouts, <code>shop_payment_id</code> must be unique within a single shop.
      </div>
  - name: withdraw-statuses
    x-displayName: Payout statuses
    description: |
      If the payout has been successfully created, the response will contain a unique payment identifier and its status.

      The status can be final and non-final, for non-final status, you must make a status request before receiving the final status.

      | Numerical identifier | Description                        | Final   |
      |:-----:|---------------------------------------------------|:--------:|
      |  1    | Payout has been created, awaits processing        | &minus; |
      |  3    | Sent to the payment system                        | &minus; |
      |  4    | Payout error on the part of the payment system    | &minus; |
      |  5    | Successfully completed                            | &plus;  |
      |  6    | Rejected by the payment system                    | &plus;  |
      |  9    | Network error on the part of the payment system   | &minus; |
