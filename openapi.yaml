              example: false
            message:
              example: Invoice cannot be refunded. Refund amount limit has been reached
            error_code:
              example: 102
    InvoiceRefundStatusPayload.v1:
      title: Get refund status
      allOf:
        - $ref: '#/components/schemas/ShopID.v1'
        - $ref: '#/components/schemas/InvoiceID.v1'
        - $ref: '#/components/schemas/Now.v1'
      required:
        - shop_id
        - invoice_id
        - now
    PaymentTokenCreateBase.v1:
      allOf:
        - type: object
          properties:
            shop_id:
              type: integer
              minimum: 1
              description: Unique shop identifier in M5. You will receive it in the letter when registering in the system
              example: 904
            shop_request_id:
              type: string
              maxLength: 255
              description: Token issue request identifier in your system. Should be unique for each new request
              example: 1dd25c42-81e7-11ed-a1eb-0242ac120002
            payway:
              type: string
              maxLength: 150
              pattern: ^[A-Za-z_,\[\]]+$
              example: wallet_usd
              description: |-
                Payment way for which token will be issued.
                The list of all payment ways available to the shop may be obtained in two ways:
                  * Execute API request "Receipt of input payment methods" [shop_input_config/shop](#operation/post-shop-input-config-shop).
                  * Request the list from the support service
          required:
            - shop_id
            - shop_request_id
            - payway
    PaymentTokenCreateCard.v1:
      title: Bank card token issue
      allOf:
        - $ref: '#/components/schemas/PaymentTokenCreateBase.v1'
        - type: object
          properties:
            payment_method_data:
              type: object
              description: Data to issue the token under a certain payment way - payway"
              properties:
                card:
                  type: object
                  description: Information on the bank card
                  properties:
                    number:
                      type: string
                      description: Bank card number
                      example: '4916651071478312'
                    cardholder:
                      type: string
                      description: Name of the card holder, if the parameter was not submitted - «Card Holder» value will be used
                      pattern: ^[0-9A-Z-/ _.']{1,26}$
                      example: JENNIFER GREEN
                    expiry_month:
                      type: string
                      description: Month of bank card expiration
                      pattern: '^0?[1-9]{1}$)|(^1[012]{1}$'
                      example: '08'
                    expiry_year:
                      type: string
                      description: Year of bank card expiration
                      pattern: ^\d{2}$
                      example: '27'
                    cvv:
                      type: string
                      description: Security code
                      example: '876'
                      pattern: ^\d{3, 4}$
                  required:
                    - number
                    - expiry_month
                    - expiry_year
                    - cvv
              required:
                - card
            redirect:
              type: object
              description: Data to return the user to shop page
              properties:
                failed_url:
                  type: string
                  description: URL to which the user will be redirected after unsuccessful token issue
                  format: uri
                  example: https://example.com/redirect/?status=failed
                success_url:
                  type: string
                  description: URL to which the user will be redirected after successful token issue
                  format: uri
                  example: https://example.com/redirect/?status=success
            callback:
              type: object
              description: Data to receive automatic notifications on token issue status
              properties:
                rejected_url:
                  type: string
                  description: URL to which the notification on unsuccessful token issue will be sent
                  format: uri
                  example: https://example.com/callback/?status=rejected
                success_url:
                  type: string
                  description: URL to which the notification on successful token issue will be sent
                  format: uri
                  example: https://example.com/callback/?status=success
          required:
            - payment_method_data
    PaymentTokenCreatePayload.v1:
      oneOf:
        - $ref: '#/components/schemas/PaymentTokenCreateCard.v1'
    PaymentTokenCreateResponseCard.v1:
      title: Successful response, bank card
      type: object
      allOf:
        - $ref: '#/components/schemas/ResponseOK.v1'
        - properties:
            data:
              type: object
              description: Information on payment token issue status
              example:
                payment_token:
                  token: a8ab95e1-4566-4fe9-93ea-bd83698ff5a0
                  payway: wallet_usd
                  expires_at: null
                  status: WAITING
                  account: 411111XXXXXX1111
                  error_code: 0
                  card_info: null
                confirmation_data:
                  data:
                    MD: 38e3244e2bcc4ed7a29aaa886a0e5374
                    PaReq: 
                    TermUrl: https://card-api-test.example.com/v1/invoice/finish3ds/38e3244e2bcc4ed7a29aaa886a0e5374
                  method: POST
                  url: https://example.com/acs/auth/start.do
              properties:
                payment_token:
                  type: object
                  description: Payment token data
                  properties:
                    token:
                      type: string
                      format: uuid
                      description: Payment token
                      example: 4f6cf35x-2c4y-483z-a0a9-158621f77a21
                    payway:
                      type: string
                      maxLength: 150
                      pattern: ^[A-Za-z_,\[\]]+$
                      example: wallet_usd
                      description: Payment way for which token is issued.
                    expires_at:
                      title: <ISO 8601>
                      nullable: true
                      type: string
                      format: date-time
                      example: '2025-12-27T20:07:02'
                      description: Date and time of payment token expiration
                    status:
                      $ref: '#/components/schemas/PaymentTokenStatus.v1'
                    account:
                      type: string
                      example: 411111XXXXXX1111
                      description: Masked card number for which token is issued
                    error_code:
                      type: integer
                      description: Payment scheme error code. If this value is more than `0`, it means that the payment scheme error occurred when confirming the token or confirmation failed. [Error codes description](#tag/errors-list)
                    card_info:
                      type: object
                      nullable: true
                      description: Information on the bank card
                      properties:
                        is_valid:
                          type: boolean
                          example: true
                          description: Result of card verification, `true` means that the card is available for purchases
                        issuing_country:
                          type: string
                          maxLength: 3
                          minLength: 3
                          description: Issuer's country code. Alphabetical country identifier under [ISO 3166-1 alpha-3](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3).
                          example: GBR
                        issuing_bank:
                          type: string
                          example: Example Bank
                          description: Issuing bank
                        payment_system:
                          type: string
                          example: VISA
                          description: Payment scheme type
                        funding_source:
                          type: string
                          example: DEBIT
                          description: Card type
                        payment_system_product:
                          type: string
                          example: GOLD
                          description: Card category
                      required:
                        - is_valid
                  required:
                    - token
                    - payway
                    - status
                    - account
                    - expires_at
                    - error_code
                confirmation_data:
                  type: object
                  nullable: true
                  description: Additional requirement to complete payment instrument authentication
                  properties:
                    data:
                      type: object
                      description: Data for sending using `method` to `url`. The fields below are given as an example, actual field names and their quantity will differ depending on the payment scheme
                      properties:
                        key1:
                          type: string
                          example: value1
                        key2:
                          type: string
                          example: value2
                    method:
                      type: string
                      enum:
                        - GET
                        - POST
                      description: Method of `data` sending to `url`
                      example: GET
                    url:
                      type: string
                      description: URL to which it is necessary to send the content of `data` field using `method`
                      format: uri
                      example: https://example.com/acs/auth/start.do
    PaymentTokenCreateResponseFail.v1:
      title: Response with error
      type: object
      allOf:
        - $ref: '#/components/schemas/ResponseFail.v1'
        - properties:
            data:
              type: object
              description: Information on payment token issue status
              nullable: true
              example: null
    PaymentTokenCreateResponse.v1:
      oneOf:
        - $ref: '#/components/schemas/PaymentTokenCreateResponseCard.v1'
        - $ref: '#/components/schemas/PaymentTokenCreateResponseFail.v1'
