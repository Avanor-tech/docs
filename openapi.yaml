        <div class="attention">This feature is available only after approval by the manager.</div>

        *First step of two-step payment.*

        First step is performed according to the scheme [invoice/create](#operation/post-invoice-create).

        After successful creation and payment of the invoice, [status](#tag/invoice-statuses) will be equal to **8 (Invoice funds are on hold in the payment system)**.

        To complete the funds receipt operation, execute [invoice/charge](#operation/post-invoice-charge) or to cancel,
        execute [invoice/unhold](#operation/post-invoice-unhold).

        <div class="warning">
        When funds are held, merchants are required to confirm or cancel the payment within 5 days.
        M4 service does not automatically confirm or cancel held payments after this period.

        The funds holding period cannot exceed 5 days.
        </div>

        <div class="success">
        <p>Fields involved in request signature generation:</p>

        * `amount`
        * `currency`
        * `payway`
        * `shop_id`
        * `shop_order_id`
