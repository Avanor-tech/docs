openapi: 3.0.2
info:
  version: 1.0.0
  title: M4 Payment Gateway API
  termsOfService: https://m4solutions.io/terms
  contact:
    url: https://api.m4psp.com/gateway/v1/
    name: M4 Support
  description: |-
    ![M4 Logo](/assets/m4/images/m4-logo.png)

    ## Description

    Using this API, you can interact with M4 payment platform: accept payments, make payments and perform other operations supported by the platform.

    API runs over HTTP(S) protocol and uses JSON format to exchange data.

    All API requests must use `UTF-8` encoding and specify the `Content-Type: application/json` header. Each request must be signed, the signature generation process is described below, in the **Request signature** section.

    We use the [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) standard as the date and time formats, if the time zone is not specified, then [UTC+03:00](https://en.wikipedia.org/wiki/Time_zone) is assumed.


    ## API changes

    To ensure that our API improvements do not break your integration, please consider the following list of backward compatible changes that can occur without increasing your M4 API version number.

    <div class="success">
    <p>We consider the following changes to our services to be backward-compatible:</p>

    * Adding new optional request parameters to existing API methods
    * Adding new fields to existing API responses (disregarding nullability)
    * Changing the order of fields in existing API responses
    * Adding new error codes
    * Adding new optional HTTP request headers
    * Adding new HTTP response headers
    * Adding new types of callback notifications
    * Changing the order of fields in callback notifications
    * Adding new fields in callback notification (while complying with the request signing rules)
    </div>

    ## Request signature

