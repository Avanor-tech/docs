    InvoiceExpiresAt.v1:
      type: object
      properties:
        expires_at:
          title: <ISO 8601>
          type: string
          nullable: true
          format: date-time
          example: '2026-12-30T03:00:00+03:00'
          description: |
            Invoice expiration date in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.
            If invoice is not paid until this date, subsequent invoice payment will not be possible.
      required:
